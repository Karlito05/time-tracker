
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: timetracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d timetracker"]
      interval: 5s
      timeout: 5s
      retries: 5
  nextjs-standalone-with-bun:
    build:
      context: .
      dockerfile: Dockerfile.bun
    image: nextjs-standalone-bun-image
    container_name: nextjs-standalone-bun-container
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://app:changeme@db:5432/timetracker
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: YOUR DOMAIN
      AUTH_SECRET: SECRET
      AUTH_GITHUB_ID: GITHUB_ID
      AUTH_GITHUB_SECRET: GITHUB SECRET

    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
 
volumes:
  pgdata:
 

